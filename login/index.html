<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | My Portal | Emirates Airline Roblox</title>
  
  <link rel="icon" href="https://i.ibb.co/84g34ff6/Emirates-banner-logo.jpg" id="favicon" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Open Sans', sans-serif; background-color: #ffffff; color: #111827; margin: 0; height: 100vh; overflow: hidden; }
    h1, h2, h3, h4, .font-heading { font-family: 'Montserrat', sans-serif; }
    
    .ek-input { width: 100%; border: 1px solid #d1d5db; padding: 1rem 1.25rem; border-radius: 3px; font-size: 0.95rem; color: #111827; transition: border-color 0.2s; }
    .ek-input:focus { outline: none; border-color: #D71A21; box-shadow: inset 0 0 0 1px #D71A21; }
    .ek-label { display: block; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #6b7280; margin-bottom: 0.5rem; font-family: 'Montserrat', sans-serif; }
    
    .ek-btn-primary { display: inline-block; background-color: #D71A21; color: #ffffff; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; padding: 1.25rem 2rem; border-radius: 2px; transition: all 0.3s ease; border: 1px solid #D71A21; cursor: pointer; text-align: center; width: 100%; }
    .ek-btn-primary:hover { background-color: #991b1b; border-color: #991b1b; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(215, 26, 33, 0.3); }

    .split-bg { background-image: url('https://i.ibb.co/tTyxcwxP/a350v2.webp'); background-size: cover; background-position: center; position: relative; }
    .split-overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(17, 24, 39, 0.9), rgba(17, 24, 39, 0.4)); }
  </style>
</head>
<body class="flex flex-col md:flex-row h-screen w-full">

  <div class="hidden md:block md:w-1/2 lg:w-3/5 split-bg h-full">
      <div class="split-overlay flex flex-col justify-between p-12 lg:p-20 text-white">
          <a href="https://emiratesgrouproblox.link"><img src="https://i.ibb.co/84g34ff6/Emirates-banner-logo.jpg" class="h-10 mix-blend-screen opacity-90" alt="Emirates"></a>
          
          <div>
              <p class="font-heading text-[#D71A21] font-bold tracking-[0.3em] uppercase text-xs mb-4">Corporate & Loyalty Portal</p>
              <h1 class="text-5xl lg:text-6xl font-heading font-black leading-tight mb-6">Manage Your<br>Virtual Aviation<br>Experience.</h1>
              <p class="text-gray-300 font-light max-w-md leading-relaxed">Log in to view upcoming itineraries, manage your Skywards miles, and access internal corporate tools.</p>
          </div>
      </div>
  </div>

  <div class="w-full md:w-1/2 lg:w-2/5 h-full bg-white flex flex-col justify-center px-8 sm:px-16 lg:px-24 overflow-y-auto">
      <div class="w-full max-w-md mx-auto py-12">
          <img src="https://i.ibb.co/84g34ff6/Emirates-banner-logo.jpg" class="h-10 mb-10 md:hidden" alt="Emirates">
          
          <h2 class="text-3xl font-heading font-bold text-[#111827] mb-2">Welcome Back</h2>
          <p class="text-gray-500 mb-8 text-sm">Please enter your credentials to access My Portal.</p>

          <div id="login-alert" class="hidden mb-6 p-4 rounded text-xs font-bold uppercase tracking-widest border bg-red-50 text-red-600 border-red-200 text-center font-heading"></div>

          <form id="login-form" class="space-y-6">
              <div>
                  <label class="ek-label">Email Address</label>
                  <input type="email" id="email" class="ek-input" placeholder="e.g. name@example.com" required>
              </div>
              <div>
                  <div class="flex justify-between items-center mb-0.5">
                      <label class="ek-label mb-0">Password</label>
                      <a href="#" class="text-[10px] font-heading font-bold text-[#D71A21] hover:underline uppercase tracking-widest">Forgot?</a>
                  </div>
                  <input type="password" id="password" class="ek-input" placeholder="••••••••" required>
              </div>
              
              <button type="submit" id="btn-login" class="ek-btn-primary mt-4">
                  Log In Securely &rarr;
              </button>
          </form>

          <p class="mt-8 text-center text-sm text-gray-500">
              Don't have an account? <a href="/signup/" class="font-bold text-[#111827] hover:text-[#D71A21] transition-colors underline">Create one now</a>.
          </p>
      </div>
  </div>

  <script>
    // Supabase Init
    const sb = window.supabase.createClient(
        'https://zboyabxzhptnxnmofvcz.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpib3lhYnh6aHB0bnhubW9mdmN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3NjU3MTgsImV4cCI6MjA4NTM0MTcxOH0.2et1T3bQqr-ZzZgx-VWaq3kR0FJDprcAbbWBby6oRys'
    );

    // Auto-redirect if already logged in
    sb.auth.getSession().then(({ data: { session } }) => {
        if (session) window.location.href = '/';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-login');
        const alertBox = document.getElementById('login-alert');
        
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';
        btn.disabled = true;
        alertBox.classList.add('hidden');

        const { error } = await sb.auth.signInWithPassword({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value
        });

        if (error) {
            alertBox.innerText = error.message;
            alertBox.classList.remove('hidden');
            btn.innerHTML = 'Log In Securely &rarr;';
            btn.disabled = false;
        } else {
            // Success - redirect to portal dashboard
            window.location.href = '/';
        }
    });
  </script>
</body>
</html>
